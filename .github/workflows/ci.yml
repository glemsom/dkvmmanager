name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Generate version
        run: printf '%s\n' '// Code generated from VERSION file. DO NOT EDIT.' '' 'package version' '' '// Version holds the current version of the application.' '// Can be overridden at build time using -ldflags.' 'var Version = "$(cat VERSION)"' > internal/version/version_gen.go

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -v ./...
